<!doctype html>
<html lang="ar" dir="rtl" data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Exam-Pass — طلباتي</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
:root{--deep:#123a35;--deep2:#1e6256;--ink:#173236;--muted:#657a7d;--paper:#f7faf7;--card:#fff;--mint:#e6f2e8;--line:#dce8e1;--gold:#ffbd22;--blue:#317fd2;--font:'Tajawal','Noto Sans Arabic',Arial,sans-serif;--shadow:0 14px 42px rgba(18,58,53,.09)}[data-theme=dark]{--deep:#0c2823;--deep2:#1e6256;--ink:#e8f0ec;--muted:#a5b9b4;--paper:#081613;--card:#102722;--mint:#14382f;--line:#24443b;--gold:#ffc94d;--blue:#77b2ff;--shadow:0 14px 42px rgba(0,0,0,.3)}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);background:linear-gradient(145deg,var(--paper),var(--mint));font:15px/1.65 var(--font)}button{font:inherit;cursor:pointer}a{text-decoration:none;color:inherit}.shell{max-width:1050px;margin:auto;padding:22px clamp(16px,4vw,48px) 52px}.top{display:flex;align-items:center;justify-content:space-between;gap:15px;margin-bottom:33px}.brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:19px}.mark{display:grid;place-items:center;width:39px;height:39px;border-radius:12px;background:var(--deep);color:#fff;font-size:14px}.brand small{display:block;margin-top:-4px;color:var(--muted);font-size:10px}.actions{display:flex;gap:8px}.btn,.back{display:flex;align-items:center;justify-content:center;gap:7px;min-height:43px;border:1px solid var(--line);border-radius:11px;background:var(--card);color:var(--ink);font-size:12px;font-weight:800}.btn{width:43px;font-size:18px}.back{padding:0 13px}.btn:hover,.back:hover{background:var(--mint)}.hero{display:flex;justify-content:space-between;align-items:end;gap:20px;padding:26px 28px;margin-bottom:19px;border-radius:19px;color:#fff;background:linear-gradient(135deg,var(--deep),#277262);box-shadow:0 14px 32px rgba(18,58,53,.18)}.hero p{margin:0 0 4px;color:#d7efe6;font-size:13px}.hero h1{margin:0;font-size:27px}.add{display:flex;align-items:center;justify-content:center;min-height:41px;padding:0 14px;border-radius:11px;background:var(--gold);color:#4c3500;font-size:12px;font-weight:900}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}.summary div{padding:16px;border:1px solid var(--line);border-radius:14px;background:var(--card);box-shadow:var(--shadow)}.summary b{display:block;font-size:25px;line-height:1.1}.summary span{color:var(--muted);font-size:11px;font-weight:800}.card{padding:18px;border:1px solid var(--line);border-radius:18px;background:var(--card);box-shadow:var(--shadow)}.head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.head h2{margin:0;font-size:17px}.refresh{border:0;border-radius:9px;padding:8px 11px;background:var(--mint);color:var(--deep);font-size:11px;font-weight:900}.loading,.empty{padding:42px 16px;color:var(--muted);text-align:center;font-weight:800}.spinner{display:inline-block;width:19px;height:19px;margin-left:8px;vertical-align:-4px;border:2px solid var(--line);border-top-color:var(--deep2);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.list{display:grid;gap:10px}.item{display:grid;grid-template-columns:112px 1fr auto;gap:15px;align-items:center;padding:15px;border:1px solid var(--line);border-radius:14px;background:var(--paper)}.number{font:900 15px/1.2 ui-monospace,SFMono-Regular,monospace;direction:ltr;color:var(--deep)}.meta b{display:block;font-size:13px}.meta span{color:var(--muted);font-size:11px}.status{padding:4px 9px;border-radius:7px;background:#e4f5ea;color:#23704f;font-size:10px;font-weight:900}.status.review{background:#e8f2ff;color:#2262a9}.status.done{background:#f3eaff;color:#7244a1}.details{display:none;grid-column:1/-1;padding:11px 13px;border-top:1px solid var(--line);color:var(--muted);font-size:11px}.item.open .details{display:block}.item button{border:0;background:transparent;color:var(--deep2);font-size:11px;font-weight:900}.error{padding:15px;border:1px solid #f2b9af;border-radius:12px;background:#ffebe7;color:#b84232;font-size:13px;font-weight:800}@media(max-width:650px){.shell{padding:16px}.hero{align-items:start;flex-direction:column;padding:22px}.hero h1{font-size:23px}.summary{grid-template-columns:1fr 1fr}.summary div:last-child{grid-column:1/-1}.item{grid-template-columns:1fr auto}.number{grid-column:1/-1}.meta{grid-column:1}.status{grid-column:2;grid-row:2}.details{grid-column:1/-1}.back{font-size:0;width:43px;padding:0}.back::after{content:'←';font-size:18px}}@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition:none!important}}
</style></head><body><main class="shell"><header class="top"><a class="brand" href="dashboard.html"><span class="mark">EP</span><span>exam-pass<small>منصّة التعلّم الذكي</small></span></a><div class="actions"><button class="btn" id="theme" type="button" aria-label="تبديل المظهر">☾</button><a class="back" href="dashboard.html">← لوحة المتابعة</a></div></header><section class="hero"><div><p>مركز متابعة الطلبات</p><h1>طلباتي</h1></div><a class="add" href="request.html">＋ سجّل طلبًا جديدًا</a></section><section class="summary"><div><b id="total">—</b><span>إجمالي الطلبات</span></div><div><b id="newCount">—</b><span>طلبات جديدة</span></div><div><b id="reviewCount">—</b><span>قيد المراجعة</span></div></section><section class="card"><div class="head"><h2>تسلسل طلباتك</h2><button class="refresh" type="button" onclick="loadRequests()">↻ تحديث</button></div><div id="content" class="loading"><span class="spinner"></span>جارٍ تحميل الطلبات…</div></section></main><script>
const SUPABASE_URL='https://pigavirpwiireyugxmcq.supabase.co',SUPABASE_ANON_KEY='sb_publishable_eTsW2oiBL0znjXPZD6XfpQ_jKDhtnwi',sb=window.supabase?.createClient(SUPABASE_URL,SUPABASE_ANON_KEY),$=id=>document.getElementById(id);function theme(v){document.documentElement.dataset.theme=v;localStorage.setItem('ep_theme',v);$('theme').textContent=v==='dark'?'☀':'☾'}theme(localStorage.getItem('ep_theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'));$('theme').onclick=()=>theme(document.documentElement.dataset.theme==='dark'?'light':'dark');const ref=n=>`EP-${String(n).padStart(6,'0')}`,statusInfo=s=>s==='in_review'?['قيد المراجعة','review']:s==='resolved'?['مكتمل','done']:['جديد',''];const fmt=d=>new Intl.DateTimeFormat('ar-SA',{year:'numeric',month:'long',day:'numeric'}).format(new Date(d));function text(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}async function checkSession(){if(!sb){$('content').innerHTML='<div class="error">تعذر تحميل خدمة الطلبات. أعد تحميل الصفحة.</div>';return null}const{data:{session}}=await sb.auth.getSession();if(!session){location.replace('auth.html');return null}return session}async function loadRequests(){const session=await checkSession();if(!session)return;$('content').className='loading';$('content').innerHTML='<span class="spinner"></span>جارٍ تحميل الطلبات…';const{data, error}=await sb.from('support_requests').select('request_number,status,exam_booked,training_completed,expected_exam_date,notes,created_at').order('created_at',{ascending:false});if(error){$('content').className='';$('content').innerHTML=`<div class="error">تعذر تحميل الطلبات: ${text(error.message||'تحقق من إعداد جدول الطلبات.')}</div>`;return}$('total').textContent=data.length;$('newCount').textContent=data.filter(x=>x.status==='new').length;$('reviewCount').textContent=data.filter(x=>x.status==='in_review').length;if(!data.length){$('content').className='empty';$('content').innerHTML='لا توجد طلبات حتى الآن.<br><a class="add" style="display:inline-flex;margin-top:14px" href="request.html">سجّل طلبك الأول</a>';return}$('content').className='list';$('content').innerHTML=data.map(x=>{const[status,klass]=statusInfo(x.status);const details=`حجز الاختبار: ${x.exam_booked?'نعم':'لا'} · التدريب عبر المنصة: ${x.training_completed?'نعم':'لا'} · موعد الاختبار: ${fmt(x.expected_exam_date)}${x.notes?`<br>ملاحظات: ${text(x.notes)}`:''}`;return`<article class="item"><strong class="number">${ref(x.request_number)}</strong><div class="meta"><b>تم التسجيل ${fmt(x.created_at)}</b><span>موعد الاختبار المتوقع: ${fmt(x.expected_exam_date)}</span></div><span class="status ${klass}">${status}</span><button type="button" onclick="this.closest('.item').classList.toggle('open')">عرض التفاصيل</button><div class="details">${details}</div></article>`}).join('')}loadRequests();
</script></body></html>
