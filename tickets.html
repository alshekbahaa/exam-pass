<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Exam-Pass | التذاكر</title><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>:root{--g:#123a35;--m:#1e6c5c;--y:#ffc127;--bg:#f3f8f5;--c:#fff;--ink:#183238;--mut:#6c817d;--line:#d8e5de;--red:#d94d42;--orange:#c67920;--blue:#2e70ba}*{box-sizing:border-box}body{margin:0;background:linear-gradient(145deg,#f3f8f5,#e4f0e9);color:var(--ink);font:15px Tajawal,Arial,sans-serif}button,input,select,textarea{font:inherit}a{color:inherit;text-decoration:none}.page{max-width:1140px;margin:auto;padding:21px clamp(16px,4vw,44px) 48px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:26px}.brand{display:flex;align-items:center}.logo{width:224px;max-height:208px;object-fit:contain}.actions{display:flex;gap:8px}.btn{min-height:43px;padding:0 13px;border:0;border-radius:11px;background:var(--g);color:#fff;font-weight:900;cursor:pointer}.btn.gold{background:var(--y);color:#4c3900}.btn.ghost{border:1px solid var(--line);background:var(--c);color:var(--g)}.hero{display:flex;justify-content:space-between;align-items:center;gap:18px;padding:28px;border-radius:21px;background:linear-gradient(135deg,#11372f,#287363);color:#fff}.hero small{font-weight:800;color:#d6eee5}.hero h1{margin:4px 0 0;font-size:28px}.card{margin-top:18px;padding:19px;border:1px solid var(--line);border-radius:18px;background:var(--c);box-shadow:0 12px 30px #123a3511}.tools{display:grid;grid-template-columns:1fr 180px;gap:9px;margin-bottom:13px}.field{display:grid;gap:7px;margin-bottom:14px;font-size:13px;font-weight:900}.field input,.field select,.field textarea,#q{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fcfefd;color:var(--ink);outline:0}.field textarea{min-height:96px;resize:vertical}.field input:focus,.field select:focus,.field textarea:focus,#q:focus{border-color:var(--y);box-shadow:0 0 0 3px #ffc12733}.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:13px}.table{width:100%;min-width:830px;border-collapse:collapse;text-align:right;font-size:12px}.table th{padding:11px;background:#f6faf7;color:var(--mut);font-size:10px}.table td{padding:12px;border-top:1px solid var(--line)}code{font-weight:900;color:var(--g)}.pill{display:inline-block;padding:4px 8px;border-radius:7px;font-weight:900;font-size:10px}.urgent{background:#fde9e7;color:var(--red)}.high{background:#fff0db;color:var(--orange)}.normal{background:#e7f0fd;color:var(--blue)}.low{background:#eef1ef;color:#5a6e68}.open{background:#e5f4ea;color:#21704d}.in_progress{background:#e7f0fd;color:var(--blue)}.closed{background:#ece6f7;color:#6c4696}.modal{display:none;position:fixed;z-index:5;inset:0;place-items:center;padding:16px;background:#102e2799}.modal.show,.modal:target{display:grid}.dialog{width:min(620px,100%);max-height:calc(100vh - 32px);overflow:auto;padding:25px;border-radius:20px;background:#fff}.dialogtop{display:flex;justify-content:space-between;align-items:start;margin-bottom:18px}.dialogtop h2{margin:0}.dialogtop p{margin:2px 0 0;color:var(--mut);font-size:11px}.x{width:36px;height:36px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:19px;cursor:pointer}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.notice{display:none;margin:14px 0;padding:11px 13px;border-radius:10px;font-size:12px;font-weight:800}.notice.show{display:block}.notice.ok{background:#e5f4ea;color:#21704d}.notice.error{background:#fde9e7;color:var(--red)}.adminonly{display:none}@media(max-width:650px){.logo{width:156px;max-height:148px}.top{flex-wrap:wrap}.actions{width:100%;justify-content:flex-start}.table{min-width:0}.table thead{display:none}.table,.table tbody,.table tr,.table td{display:block;width:100%}.table tr{margin-bottom:10px;padding:9px;border-bottom:1px solid var(--line);background:#fcfefd}.table td{padding:5px 7px;border:0}.table td:last-child{padding-top:9px}.top{align-items:flex-start}.actions{flex-wrap:wrap}.hero{align-items:start;flex-direction:column}.tools,.two{grid-template-columns:1fr}.page{padding:16px}.actions .btn.ghost{display:none}}body::before{content:"";position:fixed;transform:rotate(-14deg);inset:12% 12%;z-index:0;pointer-events:none;background:url("PMP-cropped.svg") center/contain no-repeat;opacity:.045;filter:grayscale(1) contrast(.85);transition:opacity .2s}body>main{position:relative;z-index:1}@media(max-width:650px){body::before{inset:25% 5%;opacity:.035}}</style></head><body><main class="page"><header class="top"><a class="brand" href="dashboard.html"><img class="logo" src="PMP-cropped.svg" alt="Exam-Pass" onerror="this.style.display='none'"/></a><div class="actions"><a class="btn ghost" href="dashboard.html">الرئيسية</a><a class="btn ghost" id="adminLink" style="display:none" href="admin.html">الإدارة</a><button class="btn ghost" onclick="out()">خروج</button></div></header><section class="hero"><div><small>دعم Exam-Pass</small><h1>تذاكر الدعم والمتابعة</h1></div><a class="btn gold" id="newTicketBtn" href="#new-ticket">＋ تذكرة جديدة</a></section><div id="msg" class="notice"></div><section class="card"><div class="tools"><input id="q" oninput="render()" placeholder="ابحث برقم التذكرة أو العنوان"><select id="priorityFilter" onchange="render()"><option value="">كل الأولويات</option><option value="urgent">عاجل</option><option value="high">مرتفع</option><option value="normal">عادي</option><option value="low">منخفض</option></select></div><div class="tablewrap"><table class="table"><thead><tr><th>رقم التذكرة</th><th>العنوان</th><th id="customerHead" style="display:none">العميل</th><th>الأولوية</th><th>الحالة</th><th>آخر تحديث</th><th>إجراء</th></tr></thead><tbody id="rows"></tbody></table></div></section></main><div id="new-ticket" class="modal" onclick="if(event.target===this)closeForm()"><section class="dialog"><div class="dialogtop"><div><h2 id="title">رفع تذكرة</h2><p>اكتب تفاصيل واضحة ليسهل متابعتها.</p></div><a class="x" href="#" aria-label="إغلاق" onclick="document.getElementById('new-ticket').classList.remove('show')">×</a></div><form id="form" onsubmit="save(event)"><input id="id" type="hidden"><label class="field">عنوان التذكرة<input id="ticketTitle" maxlength="120" required></label><div class="two"><label class="field">نوع الطلب<select id="category"><option value="technical">مشكلة تقنية</option><option value="account">الحساب والدخول</option><option value="exam">الاختبار والموعد</option><option value="payment">الدفع</option><option value="other">أخرى</option></select></label><label class="field">الأولوية<select id="priority"><option value="normal">عادي</option><option value="high">مرتفع</option><option value="urgent">عاجل</option><option value="low">منخفض</option></select></label></div><label class="field">التفاصيل<textarea id="description" maxlength="2500" required></textarea></label><div class="adminonly" id="adminFields"><label class="field">حالة التذكرة<select id="status"><option value="open">مفتوحة</option><option value="in_progress">قيد المعالجة</option><option value="closed">مغلقة</option></select></label><label class="field">رد المدير<textarea id="adminReply"></textarea></label></div><button class="btn" style="width:100%">حفظ التذكرة</button></form></section></div><script>const U='https://pigavirpwiireyugxmcq.supabase.co',K='sb_publishable_eTsW2oiBL0znjXPZD6XfpQ_jKDhtnwi',sb=window.supabase?.createClient(U,K),$=x=>document.getElementById(x);let session,isAdmin=false,tickets=[];const e=s=>String(s||'').replace(/[&<>"']/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[x])),n=x=>'EP-T-'+String(x).padStart(6,'0'),d=x=>new Intl.DateTimeFormat('ar-SA',{year:'numeric',month:'short',day:'numeric'}).format(new Date(x)),labels={urgent:'عاجل',high:'مرتفع',normal:'عادي',low:'منخفض',open:'مفتوحة',in_progress:'قيد المعالجة',closed:'مغلقة'},say=(x,b=false)=>{$('msg').textContent=x;$('msg').className='notice show '+(b?'error':'ok');setTimeout(()=>$('msg').className='notice',4200)};async function boot(){if(!sb)return;let{data:{session:s}}=await sb.auth.getSession();if(!s){location.href='auth.html';return}session=s;let{data:ok}=await sb.rpc('is_exam_pass_admin');isAdmin=!!ok;if(isAdmin){$('adminLink').style.display='inline-flex';$('customerHead').style.display='table-cell'}load()}async function load(){let q=sb.from('tickets').select('*').order('created_at',{ascending:false});if(!isAdmin)q=q.eq('user_id',session.user.id);let{data,error}=await q;if(error){say(error.message,true);return}tickets=data||[];render()}function render(){let text=$('q').value.toLowerCase(),f=$('priorityFilter').value,list=tickets.filter(x=>(!text||[n(x.ticket_number),x.title].join(' ').toLowerCase().includes(text))&&(!f||x.priority===f));$('rows').innerHTML=list.length?list.map(x=>`<tr><td><code>${n(x.ticket_number)}</code></td><td>${e(x.title)}</td>${isAdmin?`<td>${e(x.user_name||'—')}<br><small>${e(x.user_email||'')}</small></td>`:''}<td><span class="pill ${x.priority}">${labels[x.priority]}</span></td><td><span class="pill ${x.status}">${labels[x.status]}</span></td><td>${d(x.updated_at||x.created_at)}</td><td><button class="btn ghost" onclick="openForm('${x.id}')">${isAdmin?'تعديل':'عرض'}</button></td></tr>`).join(''):'<tr><td colspan="7" style="padding:30px;text-align:center;color:#6c817d">لا توجد تذاكر</td></tr>'}function openForm(key=''){let x=tickets.find(v=>v.id===key);$('form').reset();$('id').value=key;$('adminFields').style.display=isAdmin&&x?'block':'none';$('title').textContent=x?'تفاصيل التذكرة':'رفع تذكرة';if(x){$('ticketTitle').value=x.title;$('category').value=x.category;$('priority').value=x.priority;$('description').value=x.description;$('status').value=x.status;$('adminReply').value=x.admin_reply||'';if(!isAdmin){['ticketTitle','category','priority','description'].forEach(k=>$(k).disabled=true);if(x.status==='closed'){$('title').textContent='تذكرة مغلقة';document.querySelector('#form button[type=submit]').style.display='none'}}}else {['ticketTitle','category','priority','description'].forEach(k=>$(k).disabled=false);document.querySelector('#form button[type=submit]').style.display='block'}$('modal').classList.add('show')}function closeForm(){const modal=$('new-ticket')||$('modal');modal.classList.remove('show');if(location.hash==='#new-ticket')history.replaceState(null,'',location.pathname+location.search)}async function save(ev){ev.preventDefault();let id=$('id').value,p={title:$('ticketTitle').value.trim(),category:$('category').value,priority:$('priority').value,description:$('description').value.trim()};let r;if(id){if(!isAdmin){closeForm();return}p.status=$('status').value;p.admin_reply=$('adminReply').value.trim()||null;r=await sb.from('tickets').update(p).eq('id',id)}else r=await sb.from('tickets').insert({...p,user_id:session.user.id,user_email:session.user.email,user_name:session.user.user_metadata?.full_name||session.user.email.split('@')[0]});if(r.error){say(r.error.message,true);return}closeForm();say(id?'تم تحديث التذكرة.':'تم إرسال التذكرة.');load()}async function out(){await sb.auth.signOut();location.href='auth.html'}boot()</script></body></html>
