<!doctype html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exam-Pass | نظام التذاكر والدعم</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  
  <!-- مكتبة Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      /* نفس الهوية البصرية للموقع الأساسي */
      --ink: #193236; --deep: #123A35; --deep2: #1E6256; --mint: #E6F2E8; --paper: #FCFBF7; 
      --warm: #FFF5E8; --gold: #FFBD22; --coral: #F36F5A; --muted: #607276; --line: #D9E4DD; 
      --shadow: 0 12px 35px rgba(22,63,56,.08);
      --font-ui: 'Tajawal', Arial, sans-serif;
      --card-bg: #ffffff;
      
      /* ألوان مخصصة لحالات التذاكر */
      --st-open-bg: #E2F3E8; --st-open-txt: #26704E;
      --st-prog-bg: #E7F0FD; --st-prog-txt: #2E70BA;
      --st-close-bg: #F0F4F2; --st-close-txt: #5A6E68;
      
      /* ألوان الأولويات */
      --pr-urgent-bg: #FDE9E7; --pr-urgent-txt: #D94D42;
      --pr-high-bg: #FFF0DB; --pr-high-txt: #C67920;
      --pr-norm-bg: #E2F3E8; --pr-norm-txt: #26704E;
      --pr-low-bg: #F0F4F2; --pr-low-txt: #5A6E68;
    }

    * { box-sizing: border-box; outline: none; }
    html { scroll-behavior: smooth; }
    
    body {
      margin: 0; 
      color: var(--ink); 
      background: var(--paper); 
      font-family: var(--font-ui); 
      font-size: 15px;
      line-height: 1.6; 
      background-image: radial-gradient(circle at 100% 0%, rgba(255,189,34,0.05) 0%, transparent 25%),
                        radial-gradient(circle at 0% 100%, rgba(18,58,53,0.05) 0%, transparent 25%);
      min-height: 100vh;
    }
    
    a { color: inherit; text-decoration: none; transition: 0.2s; }
    button, input, select, textarea { font-family: var(--font-ui); }

    .top-nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(252, 251, 247, 0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
      height: 80px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }
    .brand img { height: 45px; object-fit: contain; }
    .nav-actions { display: flex; gap: 12px; align-items: center; }
    
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 44px; padding: 0 20px;
      border-radius: 12px; font-weight: 800; font-size: 14px;
      cursor: pointer; transition: 0.3s; border: none;
    }
    .btn-primary { background: var(--deep); color: #fff; box-shadow: 0 6px 15px rgba(18,58,53,.15); }
    .btn-primary:hover { background: var(--deep2); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(18,58,53,.25); }
    .btn-gold { background: var(--gold); color: var(--deep); box-shadow: 0 6px 15px rgba(255,189,34,.2); }
    .btn-gold:hover { transform: translateY(-2px); filter: brightness(1.05); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }
    .btn-ghost:hover { background: var(--card-bg); color: var(--deep); border-color: var(--deep); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

    .page-container {
      max-width: 1200px; margin: 40px auto; padding: 0 20px;
    }

    .dashboard-header {
      background: linear-gradient(135deg, var(--deep), var(--deep2));
      border-radius: 24px; padding: 40px; color: #fff;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 30px; box-shadow: var(--shadow);
      position: relative; overflow: hidden;
    }
    .dashboard-header::after {
      content: ""; position: absolute; left: -50px; bottom: -50px;
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,189,34,0.15) 0%, transparent 70%);
    }
    .header-text h1 { margin: 0; font-size: 32px; font-weight: 900; letter-spacing: -0.5px; position: relative; z-index: 1;}
    .header-text p { margin: 8px 0 0; color: #A9E6D5; font-size: 15px; position: relative; z-index: 1;}

    .dashboard-grid {
      display: grid; grid-template-columns: 280px 1fr; gap: 30px; align-items: start;
    }

    .control-panel {
      background: var(--card-bg); border-radius: 20px; padding: 25px;
      box-shadow: var(--shadow); border: 1px solid var(--line);
      position: sticky; top: 100px;
    }
    .control-group { margin-bottom: 20px; }
    .control-group:last-child { margin-bottom: 0; }
    .control-label { display: block; font-size: 13px; font-weight: 800; color: var(--deep); margin-bottom: 8px; }
    
    .filter-input, .filter-select {
      width: 100%; min-height: 46px; padding: 0 15px;
      border: 1px solid var(--line); border-radius: 12px;
      background: #F9FBFA; color: var(--ink); font-size: 14px; font-weight: 600;
      transition: 0.2s;
    }
    .filter-input:focus, .filter-select:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,189,34,0.2); background: #fff; }

    .tickets-container {
      background: var(--card-bg); border-radius: 20px; padding: 10px 25px 25px;
      box-shadow: var(--shadow); border: 1px solid var(--line);
    }
    .table-wrapper { overflow-x: auto; }
    .tickets-table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: right; }
    
    .tickets-table th {
      color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
      padding: 20px 15px 15px; border-bottom: 2px solid var(--line); white-space: nowrap;
    }
    
    .tickets-table td {
      padding: 20px 15px; border-bottom: 1px solid var(--line);
      font-size: 14px; font-weight: 500; color: var(--ink); vertical-align: middle;
      transition: background 0.2s;
    }
    .tickets-table tr:last-child td { border-bottom: none; }
    .tickets-table tr:hover td { background: #FDFEFE; }
    
    .ticket-id { font-family: monospace; font-size: 14px; font-weight: bold; color: var(--deep2); background: var(--mint); padding: 6px 10px; border-radius: 8px; }
    .ticket-title { font-weight: 800; color: var(--deep); display: block; margin-bottom: 6px; font-size: 15px; }
    .ticket-date { font-size: 12px; color: var(--muted); font-weight: 600;}

    /* الشارات (Pills) لحالة التذكرة والأولوية */
    .pill { display: inline-flex; align-items: center; justify-content: center; padding: 6px 14px; border-radius: 50px; font-weight: 800; font-size: 12px; white-space: nowrap; letter-spacing: 0.5px; }
    
    .p-urgent { background: var(--pr-urgent-bg); color: var(--pr-urgent-txt); }
    .p-high { background: var(--pr-high-bg); color: var(--pr-high-txt); }
    .p-normal { background: var(--pr-norm-bg); color: var(--pr-norm-txt); }
    .p-low { background: var(--pr-low-bg); color: var(--pr-low-txt); }
    
    .s-open { background: var(--st-open-bg); color: var(--st-open-txt); }
    .s-in_progress { background: var(--st-prog-bg); color: var(--st-prog-txt); }
    .s-closed { background: var(--st-close-bg); color: var(--st-close-txt); }

    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(18, 58, 53, 0.4); backdrop-filter: blur(8px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
    
    .modal-box {
      background: var(--card-bg); width: 100%; max-width: 600px; border-radius: 28px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2); overflow: hidden;
      display: flex; flex-direction: column; max-height: 90vh;
      transform: scale(0.95) translateY(20px); transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      border: 1px solid var(--line);
    }
    .modal-overlay.active .modal-box { transform: scale(1) translateY(0); }
    
    .modal-header {
      padding: 30px 35px 20px; border-bottom: 1px solid var(--line);
      display: flex; justify-content: space-between; align-items: center; background: #fff;
    }
    .modal-header h2 { margin: 0; font-size: 24px; color: var(--deep); font-weight: 900; }
    .btn-close { background: var(--paper); border: 1px solid var(--line); width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center; cursor: pointer; font-size: 20px; color: var(--muted); transition: 0.2s; }
    .btn-close:hover { background: var(--coral); color: #fff; border-color: var(--coral); transform: rotate(90deg); }
    
    .modal-body { padding: 30px 35px; overflow-y: auto; background: #fff; }
    
    .form-group { margin-bottom: 24px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-label { display: block; font-size: 14px; font-weight: 800; margin-bottom: 10px; color: var(--deep); }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 14px 18px; border: 1px solid var(--line); border-radius: 14px;
      background: var(--paper); color: var(--ink); font-size: 15px; font-family: var(--font-ui); transition: 0.2s; font-weight: 600;
    }
    .form-textarea { min-height: 140px; resize: vertical; line-height: 1.6; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 4px rgba(255,189,34,0.15); background: #fff; }
    .form-input:disabled, .form-select:disabled, .form-textarea:disabled { background: #F0F4F2; cursor: not-allowed; color: var(--muted); opacity: 0.8; }

    .modal-footer { padding: 25px 35px; border-top: 1px solid var(--line); background: var(--paper); display: flex; justify-content: flex-end; gap: 15px; }

    .admin-section { padding: 25px; background: var(--mint); border-radius: 16px; border: 1px solid #CFE0D3; margin-top: 15px; display: none; }
    .admin-section .form-label { color: var(--deep2); }

    /* رسائل الإشعار العائمة */
    .notice-msg {
      position: fixed; top: 100px; left: 50%; transform: translateX(-50%) translateY(-20px);
      background: var(--deep); color: #fff; padding: 14px 28px; border-radius: 50px;
      font-weight: 800; font-size: 15px; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      opacity: 0; visibility: hidden; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .notice-msg.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
    .notice-msg.error { background: var(--coral); }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    @media (max-width: 992px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .control-panel { position: static; }
      .dashboard-header { flex-direction: column; text-align: center; gap: 25px; padding: 35px 20px; }
      .top-nav { padding: 0 20px; }
    }
    @media (max-width: 650px) {
      .top-nav { height: auto; padding: 20px; flex-wrap: wrap; justify-content: center; gap: 20px;}
      .nav-actions { width: 100%; justify-content: center; flex-wrap: wrap; }
      .form-row { grid-template-columns: 1fr; gap: 0; }
      .tickets-table thead { display: none; }
      .tickets-table, .tickets-table tbody, .tickets-table tr, .tickets-table td { display: block; width: 100%; text-align: right; }
      .tickets-table tr { margin-bottom: 20px; border: 1px solid var(--line); border-radius: 16px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.03); background: #fff; }
      .tickets-table td { padding: 10px 0; border: none; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--line);}
      .tickets-table td:last-child { border-bottom: none; justify-content: stretch; margin-top: 15px; }
      .tickets-table td:last-child .btn { width: 100%; }
      .tickets-table td::before { content: attr(data-label); font-weight: 800; color: var(--muted); font-size: 13px; }
      .modal-box { transform: scale(1) translateY(0); border-radius: 20px 20px 0 0; max-height: 95vh; margin-top: auto; }
      .modal-overlay { align-items: flex-end; padding: 0; }
    }
  </style>
</head>
<body>

  <!-- شريط التنقل العلوي المتناسق -->
  <header class="top-nav">
    <a class="brand" href="index.html">
      <img src="PMP-cropped.svg" alt="Exam-Pass" onerror="this.style.display='none'">
    </a>
    <div class="nav-actions">
      <a class="btn btn-ghost" href="index.html">الرئيسية</a>
      <a class="btn btn-ghost" id="adminLink" style="display:none" href="admin.html">لوحة الإدارة</a>
      <button class="btn btn-primary" onclick="out()">تسجيل الخروج</button>
    </div>
  </header>

  <!-- رسالة إشعار منبثقة (Toast) -->
  <div id="noticeToast" class="notice-msg">تمت العملية بنجاح.</div>

  <main class="page-container">
    
    <!-- القسم الترحيبي -->
    <div class="dashboard-header">
      <div class="header-text">
        <h1>تذاكر الدعم والمتابعة</h1>
        <p>نحن هنا لمساعدتك في أي استفسار أو مشكلة تواجهك في مسيرتك.</p>
      </div>
      <button class="btn btn-gold" style="min-height: 54px; font-size: 16px; padding: 0 25px;" onclick="openForm()">
        <span>＋</span> رفع تذكرة جديدة
      </button>
    </div>

    <!-- شبكة لوحة التحكم (Grid) -->
    <div class="dashboard-grid">
      
      <!-- الشريط الجانبي (الفلاتر) -->
      <aside class="control-panel">
        <div class="control-group">
          <label class="control-label">بحث سريع</label>
          <input type="text" id="q" class="filter-input" oninput="render()" placeholder="ابحث برقم التذكرة أو العنوان...">
        </div>
        <div class="control-group">
          <label class="control-label">تصفية حسب الأولوية</label>
          <select id="priorityFilter" class="filter-select" onchange="render()">
            <option value="">عرض كل التذاكر</option>
            <option value="urgent">🔴 عاجل جداً</option>
            <option value="high">🟠 أولوية مرتفعة</option>
            <option value="normal">🟢 أولوية عادية</option>
            <option value="low">⚪ أولوية منخفضة</option>
          </select>
        </div>
      </aside>

      <!-- جدول التذاكر العصري -->
      <section class="tickets-container">
        <div class="table-wrapper">
          <table class="tickets-table">
            <thead>
              <tr>
                <th>رقم التذكرة</th>
                <th>تفاصيل الطلب</th>
                <th id="customerHead" style="display:none">بيانات العميل</th>
                <th>الأولوية</th>
                <th>حالة التذكرة</th>
                <th>إجراء</th>
              </tr>
            </thead>
            <tbody id="rows">
              <!-- يتم إضافة التذاكر هنا برمجياً -->
            </tbody>
          </table>
        </div>
      </section>

    </div>
  </main>

  <div id="ticketModal" class="modal-overlay" onmousedown="if(event.target===this) closeForm()">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modalTitle">رفع تذكرة دعم جديدة</h2>
        <button class="btn-close" aria-label="إغلاق" onclick="closeForm()">×</button>
      </div>
      
      <div class="modal-body">
        <form id="ticketForm" onsubmit="save(event)">
          <input type="hidden" id="ticketId">
          
          <div class="form-group">
            <label class="form-label">عنوان المشكلة أو الاستفسار</label>
            <input type="text" id="ticketTitle" class="form-input" maxlength="120" placeholder="مثال: مشكلة في الوصول للاختبار التجريبي" required>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">نوع الطلب</label>
              <select id="category" class="form-select">
                <option value="technical">مشكلة تقنية في الموقع</option>
                <option value="account">إعدادات الحساب والدخول</option>
                <option value="exam">استفسار عن الاختبار</option>
                <option value="payment">المدفوعات والباقات</option>
                <option value="other">أخرى</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">مستوى الأولوية</label>
              <select id="priority" class="form-select">
                <option value="normal">عادي (استفسار عام)</option>
                <option value="high">مرتفع (يعيق المذاكرة)</option>
                <option value="urgent">عاجل (مشكلة حرجة)</option>
                <option value="low">منخفض (اقتراح أو ملاحظة)</option>
              </select>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">تفاصيل الطلب</label>
            <textarea id="description" class="form-textarea" maxlength="2500" placeholder="يرجى كتابة كافة التفاصيل هنا بوضوح لكي نتمكن من مساعدتك بأسرع وقت..." required></textarea>
          </div>

          <!-- قسم خاص للإدارة للرد وتغيير الحالة -->
          <div class="admin-section" id="adminFields">
            <div class="form-group">
              <label class="form-label">تحديث حالة التذكرة</label>
              <select id="status" class="form-select">
                <option value="open">مفتوحة (تحتاج رد)</option>
                <option value="in_progress">قيد المعالجة (جاري العمل عليها)</option>
                <option value="closed">مغلقة (تم الحل)</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">رد الدعم الفني (سيظهر للعميل)</label>
              <textarea id="adminReply" class="form-textarea" placeholder="اكتب ردك للعميل هنا..."></textarea>
            </div>
          </div>
        </form>
      </div>
      
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeForm()">إلغاء</button>
        <button type="submit" form="ticketForm" class="btn btn-primary" id="btnSubmit">إرسال التذكرة</button>
      </div>
    </div>
  </div>

  <script>
    // إعدادات الـ Supabase
    const U='https://pigavirpwiireyugxmcq.supabase.co';
    const K='sb_publishable_eTsW2oiBL0znjXPZD6XfpQ_jKDhtnwi';
    const sb=window.supabase?.createClient(U,K);
    const $=x=>document.getElementById(x);
    
    let session, isAdmin=false, tickets=[];
    
    // دوال مساعدة للتنسيق والحماية
    const escapeHTML=s=>String(s||'').replace(/[&<>"']/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[x]));
    const formatTicketNumber=x=>'EP-'+String(x).padStart(5,'0');
    const formatDate=x=>new Intl.DateTimeFormat('ar-SA',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}).format(new Date(x));
    
    // قواميس الترجمة والتنسيق للأولويات والحالات
    const labels = {
      urgent: { text: 'عاجل', class: 'p-urgent' },
      high: { text: 'مرتفع', class: 'p-high' },
      normal: { text: 'عادي', class: 'p-normal' },
      low: { text: 'منخفض', class: 'p-low' },
      open: { text: 'مفتوحة', class: 's-open' },
      in_progress: { text: 'قيد المعالجة', class: 's-in_progress' },
      closed: { text: 'مغلقة', class: 's-closed' }
    };

    // دالة إظهار الإشعارات العائمة
    function showToast(msg, isError=false){
      const toast = $('noticeToast');
      toast.textContent = msg;
      toast.className = 'notice-msg show ' + (isError ? 'error' : '');
      setTimeout(() => toast.className = 'notice-msg', 4000);
    }

    async function boot(){
      if(!sb) return;
      let{data:{session:s}}=await sb.auth.getSession();
      if(!s){location.href='auth.html';return}
      session=s;
      
      // التأكد من الصلاحيات
      let{data:ok}=await sb.rpc('is_exam_pass_admin');
      isAdmin=!!ok;
      if(isAdmin){
        $('adminLink').style.display='inline-flex';
        $('customerHead').style.display='table-cell';
      }
      loadTickets();
    }

    async function loadTickets(){
      let q = sb.from('tickets').select('*').order('created_at', {ascending: false});
      if(!isAdmin) q = q.eq('user_id', session.user.id);
      
      let{data,error} = await q;
      if(error){ showToast(error.message, true); return; }
      tickets = data || [];
      render();
    }

    // دالة عرض التذاكر في الجدول
    function render(){
      let text = $('q').value.toLowerCase();
      let filter = $('priorityFilter').value;
      
      let list = tickets.filter(x => 
        (!text || [formatTicketNumber(x.ticket_number), x.title].join(' ').toLowerCase().includes(text)) &&
        (!filter || x.priority === filter)
      );

      $('rows').innerHTML = list.length ? list.map(x => `
        <tr>
          <td data-label="رقم التذكرة"><span class="ticket-id">${formatTicketNumber(x.ticket_number)}</span></td>
          <td data-label="التفاصيل">
            <span class="ticket-title">${escapeHTML(x.title)}</span>
            <span class="ticket-date">تحديث: ${formatDate(x.updated_at||x.created_at)}</span>
          </td>
          ${isAdmin ? `<td data-label="العميل"><b>${escapeHTML(x.user_name||'—')}</b><br><span class="ticket-date">${escapeHTML(x.user_email||'')}</span></td>` : ''}
          <td data-label="الأولوية"><span class="pill ${labels[x.priority]?.class}">${labels[x.priority]?.text}</span></td>
          <td data-label="الحالة"><span class="pill ${labels[x.status]?.class}">${labels[x.status]?.text}</span></td>
          <td data-label="إجراء"><button class="btn btn-ghost" style="min-height:38px; padding:0 18px;" onclick="openForm('${x.id}')">${isAdmin ? 'إدارة' : 'عرض وتفاصيل'}</button></td>
        </tr>
      `).join('') : `<tr><td colspan="${isAdmin?6:5}" style="padding:50px; text-align:center; color:var(--muted); font-weight:bold; font-size:16px;">لا توجد تذاكر حالياً...</td></tr>`;
    }

    // دالة فتح النافذة المنبثقة (مصلحة وتعمل بشكل مثالي)
    function openForm(key = ''){
      let x = tickets.find(v => v.id === key);
      $('ticketForm').reset();
      $('ticketId').value = key;
      $('adminFields').style.display = isAdmin && x ? 'block' : 'none';
      $('modalTitle').textContent = x ? 'تفاصيل التذكرة' : 'رفع تذكرة دعم جديدة';
      
      if(x){
        $('ticketTitle').value = x.title;
        $('category').value = x.category;
        $('priority').value = x.priority;
        $('description').value = x.description;
        $('status').value = x.status;
        $('adminReply').value = x.admin_reply || '';
        
        // تعطيل التعديل للعميل إذا كانت التذكرة موجودة مسبقاً
        if(!isAdmin){
          ['ticketTitle','category','priority','description'].forEach(k => $(k).disabled = true);
          
          if(x.status === 'closed'){
            $('modalTitle').textContent = 'تذكرة مغلقة';
          }
          
          // عرض رد الإدارة للعميل إن وجد
          if(x.admin_reply) {
             $('adminFields').style.display = 'block';
             $('status').disabled = true;
             $('adminReply').disabled = true;
          }
          
          $('btnSubmit').style.display = 'none'; // إخفاء زر الإرسال للعميل عند العرض
        } else {
           $('btnSubmit').style.display = 'block';
           $('btnSubmit').textContent = 'حفظ التغييرات';
        }
      } else {
        ['ticketTitle','category','priority','description'].forEach(k => $(k).disabled = false);
        $('btnSubmit').style.display = 'block';
        $('btnSubmit').textContent = 'إرسال التذكرة';
      }
      
      // فتح النافذة بالـ ID الصحيح
      $('ticketModal').classList.add('active');
    }

    // دالة إغلاق النافذة
    function closeForm(){
      $('ticketModal').classList.remove('active');
    }

    // دالة الحفظ والتحديث
    async function save(ev){
      ev.preventDefault();
      let id = $('ticketId').value;
      let p = {
        title: $('ticketTitle').value.trim(),
        category: $('category').value,
        priority: $('priority').value,
        description: $('description').value.trim()
      };
      
      let r;
      if(id){
        if(!isAdmin){ closeForm(); return; } // الأمان: فقط الإدمن يعدل
        p.status = $('status').value;
        p.admin_reply = $('adminReply').value.trim() || null;
        p.updated_at = new Date().toISOString();
        r = await sb.from('tickets').update(p).eq('id', id);
      } else {
        r = await sb.from('tickets').insert({
          ...p, 
          user_id: session.user.id, 
          user_email: session.user.email, 
          user_name: session.user.user_metadata?.full_name || session.user.email.split('@')[0]
        });
      }
      
      if(r.error){ showToast(r.error.message, true); return; }
      
      closeForm();
      showToast(id ? 'تم تحديث حالة التذكرة بنجاح.' : 'تم إرسال تذكرتك بنجاح، سيتم الرد عليك قريباً.');
      loadTickets();
    }

    async function out(){
      await sb.auth.signOut();
      location.href = 'auth.html';
    }

    // تشغيل النظام عند تحميل الصفحة
    boot();
  </script>
</body>
</html>
