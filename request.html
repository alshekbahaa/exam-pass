<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Exam-Pass | سجّل طلبك</title><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>:root{--g:#123a35;--m:#1e6c5c;--y:#ffc127;--bg:#f3f8f5;--card:#fff;--ink:#183238;--mut:#6c817d;--line:#d8e5de;--bad:#d94d42;--ok:#23704c}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(145deg,#f4f9f6,#e2f0e8);color:var(--ink);font:15px Tajawal,Arial,sans-serif}body:before{content:"";position:fixed;inset:16%;z-index:0;pointer-events:none;background:url('PMP-cropped.svg') center/contain no-repeat;opacity:.04;filter:grayscale(1)}button,input,textarea{font:inherit}.page{position:relative;z-index:1;max-width:760px;margin:auto;padding:22px 20px 50px}a{text-decoration:none;color:inherit}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:24px}.logo{width:108px;max-height:100px;object-fit:contain}.back{display:flex;align-items:center;justify-content:center;min-height:44px;padding:0 14px;border:1px solid var(--line);border-radius:11px;background:#fff;color:var(--g);font-weight:900}.card{padding:clamp(22px,5vw,38px);border:1px solid var(--line);border-radius:22px;background:var(--card);box-shadow:0 16px 40px #123a3514}.head small{color:var(--m);font-weight:900}.head h1{margin:4px 0 5px;font-size:28px}.head p{margin:0 0 25px;color:var(--mut);font-size:13px}.field{display:block;margin-bottom:18px;font-weight:900;font-size:13px}.field span{display:block;margin-bottom:8px}.field input,.field textarea{width:100%;min-height:52px;padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:#fbfdfc;color:var(--ink);outline:0}.field textarea{min-height:95px;resize:vertical}.field input:focus,.field textarea:focus{border-color:var(--y);box-shadow:0 0 0 3px #ffc12733}.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}.choice{display:flex;align-items:center;justify-content:center;min-height:50px;border:1px solid var(--line);border-radius:12px;background:#fbfdfc;cursor:pointer}.choice:has(input:checked){border-color:var(--m);background:#e5f3ea}.choice input{accent-color:var(--m);margin-inline-end:8px}.btn{width:100%;min-height:54px;border:0;border-radius:13px;background:var(--g);color:#fff;font-size:16px;font-weight:900;cursor:pointer}.btn:disabled{opacity:.7}.notice{display:none;margin:0 0 16px;padding:11px 13px;border-radius:11px;font-size:12px;font-weight:800}.notice.show{display:block}.notice.ok{background:#e5f4ea;color:var(--ok)}.notice.bad{background:#fde9e7;color:var(--bad)}@media(max-width:540px){.page{padding:16px}.logo{width:78px;max-height:74px}.card{padding:23px 18px;border-radius:18px}.head h1{font-size:24px}.two{grid-template-columns:1fr}}</style></head><body><main class="page"><header class="top"><a href="dashboard.html"><img class="logo" src="PMP-cropped.svg" alt="Exam-Pass" onerror="this.style.display='none'"></a><a class="back" href="dashboard.html">← العودة للوحة</a></header><section class="card"><div class="head"><small>طلب جديد</small><h1 id="title">سجّل طلبك</h1><p id="sub">حدّد معلومات الاختبار بدقة ليتمكن فريق الدعم من متابعتك.</p></div><div id="msg" class="notice"></div><form id="form"><label class="field"><span>هل حجزت موعد الاختبار؟</span><div class="choices"><label class="choice"><input name="booked" type="radio" value="true" required>نعم</label><label class="choice"><input name="booked" type="radio" value="false">لا</label></div></label><label class="field"><span>هل أنهيت ساعات التدريب التحضيرية عبر المنصة؟</span><div class="choices"><label class="choice"><input name="training" type="radio" value="true" required>نعم</label><label class="choice"><input name="training" type="radio" value="false">لا</label></div></label><div class="two"><label class="field"><span>تاريخ الاختبار المتوقع</span><input id="date" type="date" required></label><label class="field"><span>وقت الاختبار المتوقع</span><input id="time" type="time" required></label></div><label class="field"><span>ملاحظات إضافية</span><textarea id="notes" maxlength="1000" placeholder="اكتب أي تفاصيل يحتاجها فريق الدعم..."></textarea></label><button class="btn" id="save">تسجيل الطلب</button></form></section></main><script>const U='https://pigavirpwiireyugxmcq.supabase.co',K='sb_publishable_eTsW2oiBL0znjXPZD6XfpQ_jKDhtnwi',sb=window.supabase?.createClient(U,K),$=x=>document.getElementById(x);let session,editId=new URLSearchParams(location.search).get('edit');const say=(x,b=false)=>{$('msg').textContent=x;$('msg').className='notice show '+(b?'bad':'ok')};async function boot(){if(!sb)return;let{data:{session:s}}=await sb.auth.getSession();if(!s){location.href='auth.html';return}session=s;if(editId){let{data,error}=await sb.from('support_requests').select('*').eq('id',editId).single();if(error){say('تعذر فتح هذا الطلب.',true);return}$('title').textContent='تعديل الطلب';$('sub').textContent='يمكنك تعديل البيانات الخاصة بالاختبار فقط.';$('save').textContent='حفظ التعديلات';document.querySelector(`input[name=booked][value="${data.exam_booked}"]`).checked=true;document.querySelector(`input[name=training][value="${data.training_completed}"]`).checked=true;$('date').value=data.expected_exam_date;$('time').value=data.expected_exam_at?new Date(data.expected_exam_at).toTimeString().slice(0,5):'09:00';$('notes').value=data.notes||''}}$('form').onsubmit=async e=>{e.preventDefault();let f=new FormData($('form')),date=$('date').value,time=$('time').value,p={exam_booked:f.get('booked')==='true',training_completed:f.get('training')==='true',expected_exam_date:date,expected_exam_at:new Date(`${date}T${time}:00`).toISOString(),notes:$('notes').value.trim()||null};if(!date||!time||f.get('booked')===null||f.get('training')===null){say('أكمل الحقول المطلوبة.',true);return}$('save').disabled=true;let r=editId?await sb.from('support_requests').update(p).eq('id',editId):await sb.from('support_requests').insert({...p,user_id:session.user.id,user_email:session.user.email,user_name:session.user.user_metadata?.full_name||session.user.email.split('@')[0],status:'new'});$('save').disabled=false;if(r.error){say(r.error.message,true);return}say(editId?'تم حفظ التعديلات.':'تم تسجيل طلبك بنجاح.');setTimeout(()=>location.href='dashboard.html',900)};boot()</script></body></html>
